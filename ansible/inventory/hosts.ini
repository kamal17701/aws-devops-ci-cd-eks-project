[jenkins_agents]
# jenkins-agent-1  ansible_host=<YOUR_EC2_PUBLIC_IP>  ansible_user=ec2-user  ansible_ssh_private_key_file=~/.ssh/your-key.pem
# jenkins-agent-2  ansible_host=<YOUR_EC2_PUBLIC_IP>  ansible_user=ec2-user  ansible_ssh_private_key_file=~/.ssh/your-key.pem

[jenkins_agents:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

[all:vars]
ansible_user=ec2-user
