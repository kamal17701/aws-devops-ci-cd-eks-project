name: CI/CD Pipeline — Build, Push & Deploy to EKS

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: kamalapp
  EKS_CLUSTER_NAME: kamal-eks-cluster
  IMAGE_TAG: ${{ github.sha }}

permissions:
  id-token: write   # Required for OIDC auth to AWS
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Build & Test the Java Application
  # ──────────────────────────────────────────────
  build-and-test:
    name: Build & Test (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven and run unit tests
        run: mvn clean package --batch-mode --no-transfer-progress

      - name: Upload build artifact (JAR)
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ──────────────────────────────────────────────
  # JOB 2: Build Docker Image & Push to ECR
  # ──────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push to ECR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    outputs:
      image-uri: ${{ steps.build-image.outputs.image }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # ── Download the JAR built in Job 1 ──────────────────────────────
      # This downloads the JAR into target/ in the current workspace.
      # The Dockerfile does:  COPY target/*.jar app.jar
      # So target/ MUST exist and contain the JAR before docker build runs.
      # This avoids re-running Maven inside Docker (faster, no Maven in image).
      - name: Download pre-built JAR artifact from Job 1
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      # Verify the JAR landed correctly — catches artifact issues early
      - name: Verify JAR exists in target/
        run: |
          echo "Contents of target/:"
          ls -lh target/
          JAR_COUNT=$(ls target/*.jar 2>/dev/null | wc -l)
          if [ "$JAR_COUNT" -eq 0 ]; then
            echo "❌ ERROR: No JAR found in target/ — cannot build Docker image"
            exit 1
          fi
          echo "✅ JAR found: $(ls target/*.jar)"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          LATEST_URI="$ECR_REGISTRY/$ECR_REPOSITORY:latest"

          echo "Building Docker image: $IMAGE_URI"

          docker build \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --build-arg VCS_REF="${IMAGE_TAG}" \
            --tag "$IMAGE_URI" \
            --tag "$LATEST_URI" \
            .

          echo "Pushing to ECR..."
          docker push "$IMAGE_URI"
          docker push "$LATEST_URI"

          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"
          echo "✅ Image pushed: $IMAGE_URI"

  # ──────────────────────────────────────────────
  # JOB 3: Deploy to EKS
  # ──────────────────────────────────────────────
  deploy-to-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS cluster
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      - name: Set image tag in Kubernetes manifests
        run: |
          ECR_REGISTRY=$(aws ecr describe-repositories \
            --repository-names $ECR_REPOSITORY \
            --query 'repositories[0].repositoryUri' \
            --output text)

          # Update the deployment manifest with the new image tag
          sed -i "s|IMAGE_PLACEHOLDER|$ECR_REGISTRY:$IMAGE_TAG|g" \
            kubernetes/deployment.yaml

          echo "Updated deployment.yaml with image: $ECR_REGISTRY:$IMAGE_TAG"

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f kubernetes/deployment.yaml
          kubectl apply -f kubernetes/service.yaml
          kubectl apply -f kubernetes/hpa.yaml
          kubectl apply -f kubernetes/ingress.yaml

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/kamalapp \
            --namespace default \
            --timeout=120s

      - name: Verify deployment health
        run: |
          echo "=== Pod Status ==="
          kubectl get pods -n default -l app=kamalapp

          echo "=== Service ==="
          kubectl get svc -n default kamalapp-service

          echo "=== Ingress ==="
          kubectl get ingress -n default

          # Simple health check — get ingress hostname and curl /health
          INGRESS_HOST=$(kubectl get ingress kamalapp-ingress \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")

          if [ -n "$INGRESS_HOST" ]; then
            echo "Running health check against: http://$INGRESS_HOST/health"
            for i in {1..5}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                http://$INGRESS_HOST/health || echo "000")
              echo "Attempt $i: HTTP $STATUS"
              [ "$STATUS" = "200" ] && echo "✅ Health check passed!" && break
              sleep 10
            done
          else
            echo "ℹ️  Ingress hostname not yet assigned — skipping live health check"
          fi
