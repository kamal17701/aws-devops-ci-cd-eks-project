apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: claims-ingress
  annotations:
    kubernetes.io/ingress.class: alb  # or 'nginx' if using nginx-ingress
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: claims-service
                port:
                  number: 80
